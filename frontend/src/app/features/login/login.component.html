<div class="min-h-screen flex items-center justify-center bg-taurus-green">
  <div class="max-w-sm w-full bg-white p-6 shadow-2xl mx-4 border-t-8 border-taurus-green">

    <div class="text-center mb-8">
      <img src="assets/img/taurus-logo-green.png" alt="Taurus" class="h-16 mx-auto mb-3">
      <h1 class="text-xl font-extrabold text-taurus-green tracking-[0.3em]">TAURUS</h1>
      <p class="text-gray-400 text-[10px] font-bold uppercase tracking-tighter">The human behind the machine</p>
    </div>

    @if (showErrorMessage){
      <div
           class="mb-6 p-3 bg-red-50 border-l-4 border-red-600 flex items-center space-x-3 transition-all animate-pulse">
        <i class="fas fa-exclamation-triangle text-red-600"></i>
        <div class="flex flex-col">
          <span class="text-[11px] font-black text-red-700 uppercase tracking-wider">Access Denied</span>
          <span class="text-[10px] font-bold text-red-500 uppercase">Invalid username or password</span>
        </div>
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <div class="space-y-1">
        <label class="text-[11px] uppercase font-black text-gray-500 tracking-wider ml-1">Utilisateur</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-taurus-green transition-colors">
            <i class="fas fa-user text-sm"></i>
          </div>
          <input formControlName="username" type="text"
                 class="w-full pl-11 pr-4 py-2.5 bg-gray-50 border border-gray-200 focus:ring-0 focus:border-taurus-green outline-none transition-all placeholder-gray-300 text-sm"
                 placeholder="Identifiant">
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-[11px] uppercase font-black text-gray-500 tracking-wider ml-1">Mot de passe</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-taurus-green transition-colors">
            <i class="fas fa-lock text-sm"></i>
          </div>
          <input [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 class="w-full pl-11 pr-12 py-2.5 bg-gray-50 border border-gray-200 focus:ring-0 focus:border-taurus-green outline-none transition-all placeholder-gray-300 text-sm"
                 placeholder="••••••••">

          <button type="button" (click)="togglePassword()"
                  class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-taurus-green transition-colors">
            <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
              class="w-full bg-taurus-green hover:bg-taurus-dark text-white font-black py-3.5 shadow-lg transition-all transform active:scale-[0.98] flex justify-center items-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed tracking-widest text-xs">
        <i class="fas fa-sign-in-alt"></i>
        <span>ACCÉDER AU SYSTÈME</span>
      </button>

    </form>

    <div class="mt-8 pt-4 border-t border-gray-100 flex justify-center">
      <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.3em]">
        © 2026 Taurus Technology
      </p>
    </div>
  </div>
</div>
