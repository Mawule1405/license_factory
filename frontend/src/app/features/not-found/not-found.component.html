<div class="min-h-screen bg-gray-900 flex items-center justify-center p-4 overflow-hidden relative">

  <div class="absolute inset-0 opacity-10 pointer-events-none"
       style="background-image: radial-gradient(#22c55e 0.5px, transparent 0.5px); background-size: 20px 20px;">
  </div>

  <div class="relative z-10 text-center space-y-8 animate-in fade-in zoom-in duration-500">

    <div class="relative inline-block">
      <h1 class="text-[120px] font-black text-white leading-none tracking-tighter select-none">
        404
      </h1>
      <div class="absolute top-0 left-0 w-full h-full text-taurus-green opacity-30 animate-pulse blur-[2px]">
        404
      </div>
      <p class="text-taurus-green font-mono text-xs tracking-[0.5em] uppercase mt-2">
        Critical_Error: Segment_Not_Found
      </p>
    </div>

    <div class="max-w-md mx-auto space-y-4">
      <div class="h-1 w-20 bg-taurus-green mx-auto"></div>
      <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest leading-relaxed">
        The requested neural pathway <span class="text-white">[ {{ currentPath }} ]</span>
        does not exist in the Taurus Registry. Access restricted or link expired.
      </p>
    </div>

    <div class="pt-8">
      <button routerLink="/login"
              class="px-8 py-3 bg-white text-gray-900 text-[10px] font-black uppercase tracking-[0.3em]
                     hover:bg-taurus-green hover:text-white transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)]
                     flex items-center gap-3 mx-auto group">
        <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
        Return_To_Safe_Zone
      </button>
    </div>
  </div>

  <div class="absolute inset-0 bg-scanline pointer-events-none opacity-5"></div>
</div>
