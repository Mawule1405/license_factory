<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" (click)="close.emit()"></div>

  <div class="relative bg-white w-full max-w-lg shadow-2xl border-t-8 border-taurus-green animate-in zoom-in duration-200">

    <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
      <div>
        <h2 class="text-sm font-black uppercase tracking-[0.2em] text-gray-800">Initialize Operator</h2>
        <p class="text-[9px] font-bold text-taurus-green uppercase tracking-tighter italic">Secure Data Input Protocol</p>
      </div>
      <button (click)="close.emit()" class="text-gray-400 hover:text-red-600 transition-colors">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Full Identity Name</label>
          <input formControlName="fullName" type="text" placeholder="EX: JOHN DOE"
                 class="w-full px-3 py-2 bg-gray-50 border border-gray-200 outline-none focus:border-taurus-green font-bold text-[11px] uppercase transition-all">
        </div>
        <div class="space-y-1">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">System Identifier</label>
          <input formControlName="username" type="text" placeholder="JDOE_01"
                 class="w-full px-3 py-2 bg-gray-50 border border-gray-200 outline-none focus:border-taurus-green font-bold text-[11px] uppercase transition-all">
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Electronic Mail Address</label>
        <input formControlName="email" type="email" placeholder="operator@taurus.tex"
               class="w-full px-3 py-2 bg-gray-50 border border-gray-200 outline-none focus:border-taurus-green font-bold text-[11px] lowercase italic transition-all">
      </div>

      <div class="space-y-1">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Access Key (Min 8 Chars)</label>
        <input formControlName="password" type="password" placeholder="••••••••••••"
               class="w-full px-3 py-2 bg-gray-50 border border-gray-200 outline-none focus:border-taurus-green font-bold text-[11px] transition-all">
      </div>

      <div class="space-y-1">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Privilege Level</label>
        <div class="flex gap-2">
          <button type="button" (click)="userForm.patchValue({role: 'OPERATOR'})"
                  [class]="userForm.get('role')?.value === 'OPERATOR' ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-400 border-gray-200'"
                  class="flex-1 py-2 border-2 font-black text-[10px] uppercase tracking-widest transition-all">
            Operator
          </button>
          <button type="button" (click)="userForm.patchValue({role: 'ADMINISTRATOR'})"
                  [class]="userForm.get('role')?.value === 'ADMINISTRATOR' ? 'bg-amber-500 text-white border-amber-500' : 'bg-white text-gray-400 border-gray-200'"
                  class="flex-1 py-2 border-2 font-black text-[10px] uppercase tracking-widest transition-all">
            Administrator
          </button>
        </div>
      </div>

      <div class="pt-6 flex gap-2">
        <button type="button" (click)="close.emit()"
                class="flex-1 py-3 border-2 border-gray-200 font-black text-[10px] uppercase tracking-widest hover:bg-gray-50 transition-all">
          CANCEL
        </button>
        <button type="submit" [disabled]="userForm.invalid"
                class="flex-1 py-3 bg-taurus-green text-white font-black text-[10px] uppercase tracking-widest hover:bg-taurus-dark disabled:opacity-30 transition-all shadow-lg">
          SAVE
        </button>
      </div>
    </form>
  </div>
</div>
