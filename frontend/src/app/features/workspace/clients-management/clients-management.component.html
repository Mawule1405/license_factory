<div class="space-y-1">
  <nav class="flex items-center gap-2 bg-gray-50 border border-gray-200 p-2 text-[10px] font-black tracking-widest uppercase">
    <a routerLink="/workspace/clients"
       routerLinkActive="text-taurus-green"
       [routerLinkActiveOptions]="{exact: true}"
       class="hover:text-taurus-green transition-colors flex items-center gap-2">
      <i class="fas fa-address-book"></i> CLIENT_DATABASE
    </a>

    @if (activeClientName){
      <ng-container >
        <span class="text-gray-300">/</span>
        <span class="text-gray-800 bg-white px-2 py-1 border border-gray-200 shadow-sm">
        <i class="fas fa-key text-taurus-green mr-2"></i>
        LICENSES : {{ activeClientName }}
      </span>
      </ng-container>
    }

  </nav>

  <div class="animate-fade-in">
    <router-outlet></router-outlet>
  </div>
</div>
