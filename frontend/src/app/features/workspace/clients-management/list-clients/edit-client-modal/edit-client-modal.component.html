<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop avec effet de flou -->
  <div class="absolute inset-0 bg-gray-900/70 backdrop-blur-sm" (click)="close.emit()"></div>

  <!-- Modal Container -->
  <div class="relative bg-white w-full max-w-md shadow-[0_0_50px_rgba(0,0,0,0.3)] border-t-8 border-taurus-green animate-in fade-in zoom-in duration-200">

    <!-- Header Section -->
    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
      <div>
        <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gray-800">Update_Entity_Protocol</h2>
        <p class="text-[8px] font-bold text-taurus-green uppercase tracking-widest italic">
          Node_ID: <span class="font-mono">{{ client?.id || 'NULL_REF' }}</span>
        </p>
      </div>
      <button (click)="close.emit()" class="text-gray-400 hover:text-red-600 transition-colors px-2">
        <i class="fas fa-times text-sm"></i>
      </button>
    </div>

    <!-- Form Section -->
    <form [formGroup]="clientForm" (ngSubmit)="onSubmit()" class="p-6 space-y-5">

      <!-- Name Input -->
      <div class="space-y-1">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Entity_Label</label>
        <div class="relative">
          <input formControlName="name" type="text"
                 class="w-full pl-3 pr-3 py-2 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[11px] uppercase transition-all">
        </div>
        <div *ngIf="clientForm.get('name')?.touched && clientForm.get('name')?.invalid" class="text-[8px] text-red-500 font-bold uppercase mt-1">
          Invalid_Label_Sequence
        </div>
      </div>

      <!-- Email & Phone Grid -->
      <div class="grid grid-cols-1 gap-4">
        <div class="space-y-1">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Communication_Link (Email)</label>
          <input formControlName="email" type="email"
                 class="w-full px-3 py-2 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[11px] lowercase transition-all">
        </div>

        <div class="space-y-1">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Secure_Phone_Line</label>
          <input formControlName="phone" type="text"
                 class="w-full px-3 py-2 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[11px] transition-all">
        </div>
      </div>

      <!-- Address Input -->
      <div class="space-y-1">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Physical_Installation_Base</label>
        <textarea formControlName="address" rows="2"
                  class="w-full px-3 py-2 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[11px] uppercase transition-all resize-none"></textarea>
      </div>

      <!-- Action Buttons -->
      <div class="pt-4 flex gap-2">
        <button type="button" (click)="close.emit()"
                class="flex-1 py-3 border-2 border-gray-100 text-[10px] font-black uppercase tracking-widest hover:bg-gray-100 transition-all">
          Abort_Changes
        </button>

        <button type="submit"
                [disabled]="clientForm.invalid || clientForm.pristine"
                class="flex-1 py-3 bg-gray-800 text-white text-[10px] font-black uppercase tracking-widest hover:bg-taurus-green disabled:opacity-20 disabled:cursor-not-allowed transition-all shadow-lg">
          Commit_Updates
        </button>
      </div>
    </form>
  </div>
</div>
