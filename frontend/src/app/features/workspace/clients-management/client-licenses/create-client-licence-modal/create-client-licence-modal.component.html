<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm" (click)="close.emit()"></div>

  <div class="relative bg-white w-full max-w-lg border-t-8 border-taurus-green shadow-2xl animate-in zoom-in duration-150">

    <div class="p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
      <div>
        <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gray-800">License_Generation_Protocol</h2>
        <p class="text-[8px] font-bold text-taurus-green uppercase italic tracking-widest">Hardware_Binding_Interface</p>
      </div>
      <button (click)="close.emit()" class="text-gray-400 hover:text-red-600 transition-colors">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form [formGroup]="licenseForm" (ngSubmit)="onSubmit()" class="p-6 space-y-6">

      <div class="space-y-2">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Select_Authorization_Level</label>
        <div class="grid grid-cols-3 gap-2">
          @for (lvl of levels; track lvl) {
            <button type="button" (click)="licenseForm.patchValue({level: lvl})"
                    [class]="licenseForm.get('level')?.value === lvl ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-400 border-gray-200'"
                    class="py-2 border-2 font-black text-[9px] uppercase tracking-widest transition-all">
              {{ lvl }}
            </button>
          }
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Hardware_MAC_Address (Uniqueness_Check)</label>
        <input formControlName="addressMac" type="text" placeholder="00:1A:2B:3C:4D:5E"
               class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-mono font-bold text-xs uppercase transition-all">

        @if (licenseForm.get('addressMac')?.touched && licenseForm.get('addressMac')?.invalid) {
          <p
            class="text-[8px] font-bold text-red-500 uppercase mt-1">
            Invalid_MAC_Format (XX:XX:XX:XX:XX:XX)
          </p>
        }

      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Terminal_Limit</label>
          <input formControlName="maxUsers" type="number"
                 class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-black text-xs transition-all">
        </div>
        <div class="space-y-1">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Protocol_Expiration</label>
          <input formControlName="expiryDate" type="date"
                 class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-black text-xs transition-all">
        </div>
      </div>

      <div class="pt-4 flex gap-2">
        <button type="button" (click)="close.emit()"
                class="flex-1 py-4 border-2 border-gray-100 font-black text-[10px] uppercase tracking-[0.2em] hover:bg-gray-50 transition-all">
          Abort_Mission
        </button>
        <button type="submit" [disabled]="licenseForm.invalid"
                class="flex-1 py-4 bg-taurus-green text-white font-black text-[10px] uppercase tracking-[0.2em] hover:bg-taurus-dark disabled:opacity-30 transition-all shadow-xl">
          Commit_&_Generate
        </button>
      </div>
    </form>
  </div>
</div>
