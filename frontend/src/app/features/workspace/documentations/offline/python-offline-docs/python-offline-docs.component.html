<div class="space-y-12 animate-fade-in">

  <header>
    <div class="flex items-center gap-3 mb-2">
      <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded">PYTHON CRYPTO</span>
      <h2 class="text-lg font-bold text-gray-800 uppercase tracking-tight">Validation Offline (Python)</h2>
    </div>
    <p class="text-sm text-gray-500 leading-relaxed">
      Utilisez <code>pip install pycryptodome</code> pour activer les capacités de vérification RSA.
    </p>
  </header>

  <section class="space-y-4">
    <div class="flex justify-between items-end">
      <div>
        <h4 class="text-xs font-black text-taurus-green uppercase tracking-widest">Étape 1 : Logic de vérification</h4>
      </div>
      <button (click)="copyCode(pythonOfflineCode, 'pythonOffline')"
              class="text-[10px] font-bold uppercase tracking-tighter bg-gray-100 hover:bg-taurus-green hover:text-white px-3 py-1 rounded transition-all">
        <i class="fas fa-copy mr-1"></i> {{ copyStatus['pythonOffline'] || 'Copier le code' }}
      </button>
    </div>

    <div class="relative">
      <pre class="bg-gray-900 text-gray-300 p-6 rounded-sm text-[11px] font-mono shadow-2xl overflow-x-auto leading-normal"><code>{{ pythonOfflineCode }}</code></pre>
    </div>
  </section>
</div>
