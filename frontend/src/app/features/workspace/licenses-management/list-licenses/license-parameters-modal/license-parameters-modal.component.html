<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" (click)="close.emit()"></div>

  <div class="relative bg-white w-full max-w-2xl shadow-2xl border-t-8 border-taurus-green animate-in fade-in zoom-in duration-300 overflow-hidden">

    <!-- Header -->
    <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-800 text-white">
      <div>
        <h2 class="text-xs font-black uppercase tracking-[0.3em]">License_Metadata_Viewer</h2>
        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">
          Reference_ID: <span class="text-taurus-green">{{ license?.id || 'N/A' }}</span>
        </p>
      </div>
      <button (click)="close.emit()" class="text-gray-400 hover:text-white transition-colors">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="p-6 space-y-8">

      <!-- Info Section: Client & Project -->
      <div class="grid grid-cols-2 gap-4">
        <div class="p-4 bg-gray-50 border-l-4 border-gray-200">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest block mb-1">Target_Client</label>
          <p class="text-[11px] font-bold text-gray-800 uppercase">{{ license?.clientName || 'Unknown_Client' }}</p>
        </div>
        <div class="p-4 bg-gray-50 border-l-4 border-taurus-green">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest block mb-1">Project_Engine</label>
          <p class="text-[11px] font-bold text-gray-800 uppercase">{{ license?.projectName || 'Unknown_Project' }}</p>
        </div>
      </div>

      <!-- Parameters Section -->
      <div class="space-y-4">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-2 h-2 bg-taurus-green rounded-full shadow-[0_0_5px_#22c55e]"></div>
          <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Injected_Parameters_Schema</label>
        </div>

        @if (parameterKeys.length > 0) {
          <div [formGroup]="parameterForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
            @for (key of parameterKeys; track key) {
              <div class="space-y-1 animate-in slide-in-from-bottom-2 duration-300">
                <label class="text-[9px] font-bold uppercase text-gray-500 italic">{{ key.split('_').join(' ') }}</label>
                <div class="relative">
                  <input [formControlName]="key" type="text"
                         class="w-full px-3 py-2 bg-gray-50 border border-gray-200 font-mono text-[11px] text-gray-800 uppercase">
                  <i class="fas fa-lock absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-gray-300"></i>
                </div>
              </div>
            }
          </div>
        } @else {
          <div class="py-10 border-2 border-dashed border-gray-100 text-center rounded-lg">
            <p class="text-[9px] font-black text-gray-400 uppercase italic">No_Dynamic_Parameters_Defined</p>
          </div>
        }
      </div>

      <!-- Footer Action -->
      <div class="pt-6 border-t border-gray-100">
        <button (click)="close.emit()"
                class="w-full py-3 bg-gray-900 text-white text-[10px] font-black uppercase tracking-[0.2em] hover:bg-gray-800 transition-all flex items-center justify-center gap-2">
          <i class="fas fa-arrow-left text-taurus-green"></i> Return_To_Registry
        </button>
      </div>

    </div>
  </div>
</div>
