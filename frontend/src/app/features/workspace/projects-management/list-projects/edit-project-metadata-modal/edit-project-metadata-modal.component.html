<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-gray-900/70 backdrop-blur-sm" (click)="close.emit()"></div>

  <div class="relative bg-white w-full max-w-sm shadow-2xl border-t-8 border-taurus-green animate-in fade-in zoom-in duration-200">

    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-800">
      <div>
        <h2 class="text-xs font-black uppercase tracking-[0.3em] text-taurus-green">Edit Project Metadata</h2>
        <p class="text-[8px] font-bold text-gray-400 uppercase tracking-widest italic">Registry_ID: {{ project.id }}</p>
      </div>
      <button (click)="close.emit()" class="text-gray-400 hover:text-red-600 transition-colors px-2">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" class="p-6 space-y-6">

      <div class="space-y-2">
        <div class="flex flex-col">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Project Name</label>
          <span class="text-[8px] text-taurus-green font-bold opacity-70 mb-1">
             <i class="fas fa-history mr-1"></i> CURRENT: {{ project.name }}
          </span>
        </div>
        <input formControlName="name" type="text"
               class="w-full px-3 py-2 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[11px] uppercase transition-all shadow-sm">
      </div>

      <div class="space-y-2">
        <div class="flex flex-col">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Functional Description</label>
          <div class="bg-gray-50 border-l-2 border-gray-200 p-2 mb-1">
            <p class="text-[8px] text-gray-500 font-medium italic leading-tight">
              "{{ project.description }}"
            </p>
          </div>
        </div>
        <textarea formControlName="description" rows="3"
                  class="w-full px-3 py-2 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[11px] uppercase transition-all resize-none shadow-sm"></textarea>
      </div>

      <div class="pt-2 flex gap-3">
        <button type="button" (click)="close.emit()" [disabled]="isLoading"
                class="flex-1 py-3 border-2 border-gray-100 text-[10px] font-black uppercase tracking-widest hover:bg-gray-50 transition-all">
          Abort
        </button>
        <button type="submit" [disabled]="projectForm.invalid || isLoading"
                class="flex-1 py-3 bg-gray-800 text-white text-[10px] font-black uppercase tracking-widest hover:bg-taurus-green disabled:opacity-30 transition-all shadow-lg">
          {{ isLoading ? 'Processing...' : 'Overwrite_Data' }}
        </button>
      </div>
    </form>
  </div>
</div>
