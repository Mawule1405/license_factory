<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-gray-900/70 backdrop-blur-sm" (click)="close.emit()"></div>

  <div class="relative bg-white w-full max-w-md shadow-[0_0_50px_rgba(0,0,0,0.3)] border-t-8 border-taurus-green animate-in fade-in zoom-in duration-200">

    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-taurus-green">
      <div>
        <h2 class="text-xs font-black uppercase tracking-[0.3em] text-white">create New Project</h2>
        <p class="text-[8px] font-bold text-white uppercase tracking-widest italic">Core_System_Deployment</p>
      </div>
      <button (click)="close.emit()" class="text-gray-400 hover:text-red-600 transition-colors px-2">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" class="p-6 space-y-5">

      <div class="space-y-1">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Project Name</label>
        <input formControlName="name" type="text" placeholder="EX: NEBI_BILLING_SYSTEM"
               class="w-full px-3 py-2 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[11px] uppercase transition-all">
      </div>

      <div class="space-y-1">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Functional Specifications</label>
        <textarea formControlName="description" rows="2" placeholder="Describe the project objective..."
                  class="w-full px-3 py-2 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[11px] uppercase transition-all resize-none"></textarea>
      </div>

      <div class="space-y-2" formGroupName="licenseModel">
        <div class="flex justify-between items-center">
          <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">License_Security_Parameters</label>
          <button type="button" (click)="addParameter()" class="text-[8px] bg-gray-800 text-white px-2 py-1 uppercase font-bold hover:bg-taurus-green">
            Add_Param
          </button>
        </div>

        <!-- ... début du formulaire inchangé -->

        <div formArrayName="parameters" class="space-y-2 max-h-48 overflow-y-auto pr-2">
          @for (paramGroup of parameters.controls; track $index) {
            <!-- On lie chaque ligne au FormGroup correspondant par son index -->
            <div [formGroupName]="$index" class="flex gap-2 animate-in slide-in-from-left-2 duration-200">

              <!-- Champ pour le Nom du paramètre -->
              <input formControlName="key"
                     type="text"
                     placeholder="PARAM_KEY"
                     class="flex-1 px-3 py-1 bg-gray-50 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[10px] uppercase transition-all">

              <!-- Nouveau Select pour le Type -->
              <select formControlName="type"
                      class="w-24 px-2 py-1 bg-gray-100 border-2 border-gray-100 outline-none focus:border-taurus-green font-bold text-[9px] uppercase cursor-pointer transition-all">
                <option value="text">TEXT</option>
                <option value="number">NUMBER</option>
                <option value="date">DATE</option>
                <option value="boolean">BOOLEAN</option>
              </select>

              @if (parameters.length > 1) {
                <button type="button"
                        (click)="removeParameter($index)"
                        class="text-gray-400 hover:text-red-600 transition-colors px-1">
                  <i class="fas fa-trash-alt"></i>
                </button>
              }
            </div>
          } @empty {
            <div class="text-[8px] text-gray-400 italic text-center py-2">
              No_Security_Parameters_Defined
            </div>
          }
        </div>


      </div>

      <div class="pt-4 flex gap-2">
        <button type="button" (click)="close.emit()" [disabled]="isLoading"
                class="flex-1 py-3 border-2 border-gray-100 text-[10px] font-black uppercase tracking-widest hover:bg-gray-50 transition-all disabled:opacity-50">
          Abort_Mission
        </button>
        <button type="submit" [disabled]="projectForm.invalid || isLoading"
                class="flex-1 py-3 bg-gray-800 text-white text-[10px] font-black uppercase tracking-widest hover:bg-taurus-green disabled:opacity-30 transition-all shadow-lg">
          {{ isLoading ? 'Processing...' : 'Commit_Project_Data' }}
        </button>
      </div>
    </form>
  </div>
</div>
