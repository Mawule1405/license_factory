<div class="max-w-2xl mx-auto animate-fade-in p-6">
  <div class="mb-8">
    <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Sécurité</h1>
    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.3em] mt-1">Mise à jour du mot de passe</p>
  </div>

  <div class="bg-white border border-gray-200 shadow-sm">
    <div class="p-6 border-b border-gray-100 bg-gray-50 flex items-center gap-3">
      <i class="fas fa-key text-taurus-green"></i>
      <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-gray-600">Modifier vos accès</h3>
    </div>

    <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">

      <div class="space-y-2">
        <label class="text-[9px] font-black uppercase text-gray-400 tracking-tighter">Mot de passe actuel</label>
        <div class="relative">
          <input [type]="showOld ? 'text' : 'password'" formControlName="oldPassword"
                 class="w-full border-b-2 border-gray-100 p-2 text-sm font-bold focus:border-taurus-green outline-none transition-all">
          <button type="button" (click)="showOld = !showOld" class="absolute right-2 top-2 text-gray-400">
            <i class="fas" [ngClass]="showOld ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <hr class="border-gray-50">

      <div class="space-y-2">
        <label class="text-[9px] font-black uppercase text-gray-400 tracking-tighter">Nouveau mot de passe</label>
        <div class="relative">
          <input [type]="showNew ? 'text' : 'password'" formControlName="newPassword"
                 (input)="checkStrength()"
                 class="w-full border-b-2 border-gray-100 p-2 text-sm font-bold focus:border-taurus-green outline-none transition-all">
          <button type="button" (click)="showNew = !showNew" class="absolute right-2 top-2 text-gray-400">
            <i class="fas" [ngClass]="showNew ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>

        <div class="flex gap-1 mt-2">
          <div class="h-1 flex-1 rounded-full transition-all duration-500" [ngClass]="strength >= 1 ? 'bg-red-500' : 'bg-gray-100'"></div>
          <div class="h-1 flex-1 rounded-full transition-all duration-500" [ngClass]="strength >= 2 ? 'bg-orange-500' : 'bg-gray-100'"></div>
          <div class="h-1 flex-1 rounded-full transition-all duration-500" [ngClass]="strength >= 3 ? 'bg-yellow-500' : 'bg-gray-100'"></div>
          <div class="h-1 flex-1 rounded-full transition-all duration-500" [ngClass]="strength >= 4 ? 'bg-taurus-green' : 'bg-gray-100'"></div>
        </div>
        <p class="text-[8px] font-bold uppercase tracking-widest text-right mt-1" [ngClass]="getStrengthColor()">
          Force: {{ getStrengthLabel() }}
        </p>
      </div>

      <div class="space-y-2">
        <label class="text-[9px] font-black uppercase text-gray-400 tracking-tighter">Confirmer le nouveau mot de passe</label>
        <input type="password" formControlName="confirmPassword"
               class="w-full border-b-2 border-gray-100 p-2 text-sm font-bold focus:border-taurus-green outline-none transition-all">
        @if (passwordForm.errors?.['mismatch'] && passwordForm.get('confirmPassword')?.touched) {
          <p class="text-[9px] text-red-500 font-bold uppercase mt-1">Les mots de passe ne correspondent pas</p>
        }
      </div>

      <div class="pt-6 flex justify-end gap-3">
        <button type="button" routerLink="/workspace/profile"
                class="px-6 py-2 text-[10px] font-black uppercase text-gray-400hover:text-gray-800 transition-all">
          Annuler
        </button>
        <button type="submit" [disabled]="passwordForm.invalid || isLoading || strength < 3"
                class="px-10 py-3 bg-gray-900 text-white text-[10px] font-black uppercase tracking-widest
                 hover:bg-taurus-green transition-all disabled:opacity-30 shadow-xl">
          @if (isLoading) { <i class="fas fa-spinner fa-spin mr-2"></i> }
          Mettre à jour la sécurité
        </button>
      </div>
    </form>
  </div>
</div>
