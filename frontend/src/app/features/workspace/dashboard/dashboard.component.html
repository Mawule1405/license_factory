<div class="p-1 space-y-6 bg-gray-50 min-h-screen font-sans">

  <div class="border-b-4 border-gray-900 pb-4 flex justify-between items-end">
    <h1 class="text-xl font-black uppercase italic tracking-tighter text-gray-900">
      Forge <span class="text-taurus-green">Control</span>
    </h1>
    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Independent_Data_Streams: Active</div>
  </div>

  <!-- Main Workload Section -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 border-4 border-gray-900 p-6 bg-white shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] min-h-[450px]">
      <canvas id="userWorkloadCanvas"></canvas>
    </div>

    <!-- Live Logs -->
    <div class="border-4 border-gray-900 bg-gray-900 p-6 text-white shadow-[8px_8px_0px_0px_rgba(46,213,115,0.2)]">
      <h3 class="text-xs font-black uppercase text-taurus-green mb-4 italic">Live_Signal_Feed</h3>
      <div class="space-y-4 max-h-[350px] overflow-y-auto custom-scrollbar">
        @for (log of logs(); track $index) {
          <div class="border-l-2 border-gray-700 pl-3 py-1 hover:border-taurus-green transition-colors">
            <span class="text-[7px] font-mono text-gray-500">{{ log.timestamp }}</span>
            <p class="text-[10px] font-black uppercase tracking-tighter">{{ log.action }}</p>
            <p class="text-[9px] text-gray-400 italic line-clamp-1">{{ log.details }}</p>
          </div>
        } @empty {
          <div class="animate-pulse text-gray-600 text-[10px] uppercase font-bold text-center mt-20">Synchronisation en cours...</div>
        }
      </div>
    </div>
  </div>

  <!-- Secondary Charts Section -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="border-4 border-gray-900 p-6 bg-white h-[350px] shadow-[8px_8px_0px_0px_rgba(0,0,0,0.05)]">
      <canvas id="growthCanvas"></canvas>
    </div>
    <div class="border-4 border-gray-900 p-6 bg-white h-[350px] shadow-[8px_8px_0px_0px_rgba(0,0,0,0.05)]">
      <canvas id="mixCanvas"></canvas>
    </div>
  </div>

</div>
