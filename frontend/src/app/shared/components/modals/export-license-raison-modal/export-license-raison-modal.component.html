<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" (click)="close.emit()"></div>

  <div class="relative bg-white w-full max-w-md shadow-2xl border-t-8 border-amber-500 animate-in fade-in zoom-in duration-300">

    <!-- Header -->
    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-800 text-white">
      <div>
        <h2 class="text-xs font-black uppercase tracking-[0.3em]">License_Export_Protocol</h2>
        <p class="text-[8px] font-bold text-amber-500 uppercase tracking-widest mt-1">Security_Audit_Required</p>
      </div>
      <button (click)="close.emit()" class="text-gray-400 hover:text-white transition-colors">
        <i class="fas fa-times text-sm"></i>
      </button>
    </div>

    <form [formGroup]="exportForm" (ngSubmit)="onSubmit()" class="p-6 space-y-6">

      <div class="space-y-4">
        <div class="flex items-center gap-2">
          <i class="fas fa-file-export text-amber-500 text-xs"></i>
          <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">
            Export_Justification
          </label>
        </div>

        <div class="relative">
          <textarea
            formControlName="raison"
            rows="4"
            placeholder="Enter a detailed reason for exporting this license node..."
            class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-100 outline-none focus:border-amber-500 font-mono text-[11px] text-gray-800 uppercase transition-all resize-none shadow-inner focus:bg-white"
          ></textarea>

          <!-- Indicateur de validation -->
          <div class="absolute bottom-2 right-2 flex gap-1">
            @if (exportForm.get('raison')?.valid) {
              <i class="fas fa-check-circle text-taurus-green text-[10px]"></i>
            } @else if (exportForm.get('raison')?.touched) {
              <i class="fas fa-exclamation-triangle text-amber-500 text-[10px]"></i>
            }
          </div>
        </div>

        <div class="flex justify-between items-center px-1">
          <p class="text-[8px] font-bold text-gray-400 uppercase italic">
            Min_Length: 10_Chars
          </p>
          @if (exportForm.get('raison')?.errors?.['minlength'] && exportForm.get('raison')?.touched) {
            <span class="text-[8px] font-black text-red-500 uppercase italic animate-pulse">Insufficient_Data</span>
          }
        </div>
      </div>

      <!-- Actions -->
      <div class="pt-4 flex gap-3">
        <button type="button" (click)="close.emit()" [disabled]="isLoading"
                class="flex-1 py-3 border-2 border-gray-100 text-[10px] font-black uppercase tracking-widest hover:bg-gray-50 transition-all">
          Abort
        </button>

        <button type="submit"
                [disabled]="exportForm.invalid || isLoading"
                class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all shadow-xl flex items-center justify-center gap-2"
                [ngClass]="{
                  'bg-gray-200 text-gray-400 cursor-not-allowed': exportForm.invalid && !isLoading,
                  'bg-gray-900 text-white hover:bg-amber-500': exportForm.valid && !isLoading,
                  'bg-amber-500 text-white opacity-70': isLoading
                }">
          @if (isLoading) {
            <i class="fas fa-circle-notch animate-spin"></i> Initializing_Export...
          } @else {
            <i class="fas fa-download" [class.text-amber-500]="exportForm.valid"></i>
            {{ exportForm.invalid ? 'Input_Reason' : 'Confirm_Export' }}
          }
        </button>
      </div>
    </form>
  </div>
</div>
