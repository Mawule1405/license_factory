<div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-[#0A254D]/40 modal-backdrop-animate"></div>

  <div [class]="'relative bg-white w-full max-w-sm border-t-[10px] shadow-[0_20px_50px_rgba(0,0,0,0.3)] modal-content-animate ' + getStyles().border">

    <div class="p-8 text-center">
      <div [class]="'inline-flex items-center justify-center w-16 h-16 mb-6 border-2 transition-transform duration-700 hover:rotate-12 ' + getStyles().border + ' ' + getStyles().color">
        <i [class]="'fas ' + getStyles().icon + ' text-2xl'"></i>
      </div>

      <h3 class="text-[11px] font-black uppercase tracking-[0.4em] text-[#0A254D] mb-3">
        {{ config.title }}
      </h3>

      <p class="text-[10px] font-bold text-gray-400 uppercase leading-relaxed tracking-wider mb-10">
        {{ config.message }}
      </p>

      <div class="flex gap-3">
        @if (config.type === 'PERMISSION' || config.type === 'WARNING') {
          <button
            (click)="cancelled.emit()"
            class="flex-1 py-4 border-2 border-gray-100 font-black text-[9px] uppercase tracking-[0.2em] text-gray-400 hover:bg-gray-50 hover:text-[#0A254D] transition-all duration-300">
            {{ config.cancelText || 'ABORT_ACTION' }}
          </button>
        }

        <button (click)="confirmed.emit()"
                [class]="'flex-1 py-4 text-white font-black text-[9px] uppercase tracking-[0.2em] transition-all duration-300 shadow-xl active:scale-95 ' + getStyles().bg">
          {{ config.confirmText || 'ACKNOWLEDGE_RECEIPT' }}
        </button>
      </div>
    </div>

  </div>
</div>
