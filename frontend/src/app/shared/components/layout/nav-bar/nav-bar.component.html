<nav class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shadow-sm">

  <div class="flex items-center space-x-8 h-full">
    <div class="flex items-center space-x-2">
      <img src="assets/img/taurus-logo-green.png" alt="Logo" class="h-8 w-8">
      <span class="font-black text-taurus-green tracking-tighter text-lg leading-none">TAURUS</span>
    </div>

    <div class="hidden md:flex h-full items-center space-x-0">
      <a routerLink="/workspace/dashboard"
         routerLinkActive="bg-taurus-green text-white border-b-4 border-taurus-dark"
         class="h-full flex items-center px-6 border-b-4 border-transparent hover:bg-gray-400 font-bold text-[11px] uppercase tracking-[0.2em] transition-all">
        <i class="fas fa-th-large mr-4 text-sm"></i> Dashboard
      </a>

      <a routerLink="/workspace/administration"
         routerLinkActive="bg-taurus-green text-white border-b-4 border-taurus-dark"
         class="h-full flex items-center px-6 border-b-4 border-transparent hover:bg-gray-400 font-bold text-[11px] uppercase tracking-[0.2em] transition-all">
        <i class="fas fa-cogs mr-4 text-sm"></i> Administration
      </a>

      <a routerLink="/workspace/projects"
         routerLinkActive="bg-taurus-green text-white border-b-4 border-taurus-dark"
         class="h-full flex items-center px-6 border-b-4 border-transparent hover:bg-gray-400 font-bold text-[11px] uppercase tracking-[0.2em] transition-all">
        <i class="fas fa-users-cog mr-4 text-sm"></i> Projects
      </a>

      <a routerLink="/workspace/clients"
         routerLinkActive="bg-taurus-green text-white border-b-4 border-taurus-dark"
         class="h-full flex items-center px-6 border-b-4 border-transparent hover:bg-gray-400 font-bold text-[11px] uppercase tracking-[0.2em] transition-all">
        <i class="fas fa-users-cog mr-4 text-sm"></i> Clients
      </a>

      <a routerLink="/workspace/licenses"
         routerLinkActive="bg-taurus-green text-white border-b-4 border-taurus-dark"
         class="h-full flex items-center px-6 border-b-4 border-transparent hover:bg-gray-400 font-bold text-[11px] uppercase tracking-[0.2em] transition-all">
        <i class="fas fa-file-alt mr-4 text-sm"></i> Licenses
      </a>
    </div>
  </div>

  <div class="relative" (appClickOutside)="isDropdownOpen = false">
    <button (click)="toggleDropdown()"
            class="flex items-center space-x-4 focus:outline-none px-4 py-2 hover:bg-gray-50 transition-all border-l border-gray-100">

      <div class="flex flex-col text-right hidden sm:flex justify-center h-full">
        <span class="text-[11px] font-black text-gray-800 uppercase tracking-wider leading-none">{{ username }}</span>
        <div class="flex items-center justify-end space-x-2 mt-1">
          <span class="text-[9px] text-taurus-green font-black uppercase tracking-widest">System Live</span>
          <span class="flex h-2 w-2">
            <span class="animate-blink inline-flex h-full w-full rounded-full bg-taurus-green opacity-75"></span>
          </span>
        </div>
      </div>

      <div class="bg-taurus-green text-white h-10 w-10 flex items-center justify-center font-black text-sm border-2 border-taurus-green shadow-inner">
        {{ username.charAt(0).toUpperCase() }}
      </div>

      <i class="fas fa-chevron-down text-gray-400 text-[10px] transition-transform duration-300"
         [class.rotate-180]="isDropdownOpen"></i>
    </button>

    @if (isDropdownOpen) {
      <div class="absolute right-0 mt-0 w-56 bg-white border border-gray-200 shadow-2xl z-50 animate-in fade-in slide-in-from-top-2">
        <div class="py-0">
          <a routerLink="/workspace/profile" class="flex items-center px-5 py-4 text-[11px] font-bold text-gray-700 hover:bg-taurus-green hover:text-white transition-colors uppercase tracking-[0.15em]">
            <i class="fas fa-user-circle mr-4 text-base opacity-70"></i> Profile
          </a>
          <a routerLink="/workspace/change-password" class="flex items-center px-5 py-4 text-[11px] font-bold text-gray-700 hover:bg-taurus-green hover:text-white transition-colors uppercase tracking-[0.15em]">
            <i class="fas fa-key mr-4 text-base opacity-70"></i> Change Password
          </a>
          <a routerLink="/workspace/docs" class="flex items-center px-5 py-4 text-[11px] font-bold text-gray-700 hover:bg-taurus-green hover:text-white transition-colors uppercase tracking-[0.15em]">
            <i class="fas fa-info-circle mr-4 text-base opacity-70"></i> Documentation
          </a>
          <a routerLink="/workspace/about" class="flex items-center px-5 py-4 text-[11px] font-bold text-gray-700 hover:bg-taurus-green hover:text-white transition-colors uppercase tracking-[0.15em]">
            <i class="fas fa-info-circle mr-4 text-base opacity-70"></i> About
          </a>

          <div class="border-t border-gray-100"></div>
          <button (click)="logout()"
                  class="w-full flex items-center px-5 py-4 text-[11px] font-bold text-red-600 hover:bg-red-600 hover:text-white transition-colors uppercase tracking-[0.15em]">
            <i class="fas fa-power-off mr-4 text-base opacity-70"></i> Disconnect
          </button>
        </div>
      </div>
    }
  </div>
</nav>
